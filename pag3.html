<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogadores - Marrocos</title>
</head>
<body>

    <header class="menu">
      
        <div class="logo">
            <a href="pag1.html">
                <img src="img/" alt="logo">
            </a>
        </div>
    
        <nav class="links">
            <a href="pag2.html">História</a>
            <a href="pag3.html" class="active">Jogadores</a>
            <a href="pag4.html">Galeria</a>
            <a href="pag5.html">Notícias</a>
        </nav>

    </header>


    <style>

body {
    margin: 0;
    padding-top: 80px;
}
.menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 25px 80px;

    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);

    z-index: 1000;
}

.logo-text {
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.logo-text:hover {
    color: #C1272D;
}

.links {
    display: flex;
    gap: 30px;
}

.links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    position: relative;
}

.links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #C1272D;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.links a:hover::after {
    width: 100%;
}

/* Página ativa */
.links a.active {
    color: #C1272D;
}

/* Responsivo */
@media (max-width: 768px) {
    .menu {
        padding: 15px 20px;
        flex-direction: column;
        gap: 10px;
    }

    .links {
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
}
    </style>
    
    <script>

        window.addEventListener("scroll", function () {
            const menu = document.querySelector(".menu");
        
            if (window.scrollY > 50) {
                menu.style.background = "rgba(0, 0, 0, 0.95)";
                menu.style.boxShadow = "0 2px 10px rgba(0, 0, 0, 0.5)";
            } else {
                menu.style.background = "rgba(0, 0, 0, 0.3)";
                menu.style.boxShadow = "none";
            }
        });
    </script>

</body>
</html>
