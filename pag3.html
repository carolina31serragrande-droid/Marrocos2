<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- MENU -->
     <section class="hero">
    <header class="menu">
        <div class="logo">
            <a href="pag1.html">
                <img src="img/" alt="logo">
            </a>
        </div>

        <nav class="links">
            <a href="pag2.html">História</a>
            <a href="pag3.html">Jogadores</a>
            <a href="pag4.html">Galeria</a>
            <a href="pag5.html">Últimas notícias</a>
        </nav>
    </header>
    </section>

    <!-- NÃO REMOVIDA (como você pediu) -->
    <section class="sec1">

    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <h3>Marrocos 2026</h3>
            <p>Uma jornada rumo à história no futebol mundial.</p>

            <div class="footer-links">
                <a href="pag2.html">História</a>
                <a href="pag3.html">Jogadores</a>
                <a href="pag4.html">Galeria</a>
                <a href="pag5.html">Últimas notícias</a>

            <p class="direitos">© 2026 Marrocos | Todos direitos reservados</p>
        </div>

</div>

<!-- CSS LIMPO -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    font-family: Arial, sans-serif;
}

/* MENU */
.menu {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo img {
    height: 45px;
}

.links {
    display: flex;
    gap: 30px;
}

.links a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    position: relative;
}

.links a::after {
    content: "";
    width: 0;
    height: 2px;
    background: #C1272D;
    position: absolute;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.links a:hover::after {
    width: 100%;
}

/* FOOTER */
.footer {
    background: black;
    color: white;
    text-align: center;
    padding: 60px 20px 30px;
}

.footer-content h3 {
    color: #C1272D;
    margin-bottom: 10px;
}

.footer-content p {
    color: #ccc;
}

.footer-links {
    margin: 20px 0;
}

.footer-links a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.linha-footer {
    width: 80%;
    height: 1px;
    background: #333;
    margin: 30px auto;
}

.direitos {
    font-size: 14px;
    color: #777;
}

.hero {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .menu {
        padding: 15px 20px;
    }

    .links {
        gap: 15px;
        font-size: 14px;
    }
}

@media (max-width: 480px) {
    .menu {
        flex-direction: column;
        gap: 10px;
    }

    .links {
        flex-direction: column;
        text-align: center;
    }
}
</style>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
window.addEventListener("scroll", function () {
    const menu = document.querySelector(".menu");

    if (window.scrollY > 50) {
        menu.style.background = "rgba(0,0,0,0.9)";
    } else {
        menu.style.background = "rgba(0,0,0,0.3)";
    }
});
</script>

</body>
</html>
